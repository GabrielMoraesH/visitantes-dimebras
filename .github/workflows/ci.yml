name: CI

"on":
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: dimebras_visitantes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d dimebras_visitantes_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/dimebras_visitantes_test?schema=public
      TEST_DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/dimebras_visitantes_test?schema=public
      JWT_SECRET: ci-only-test-secret-not-for-production
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Check migration status
        run: npx prisma migrate status

      - name: Check JavaScript syntax
        run: |
          find src scripts prisma -type f -name '*.js' -print0 | xargs -0 -r -n 1 node --check

      - name: Run unit tests
        run: npm test

      - name: Run integration test
        run: npm run test:integration

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_API_URL: http://localhost:3001

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
